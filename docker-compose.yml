services:
  web:
    image: node:20-alpine
    container_name: ditib-ahlen-landing
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8082"
    ports:
      - "8082:8082"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    restart: unless-stopped
